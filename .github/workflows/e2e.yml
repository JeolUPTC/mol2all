name: E2E

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mol2all
          POSTGRES_PASSWORD: mol2all_secret
          POSTGRES_DB: mol2all
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://mol2all:mol2all_secret@localhost:5432/mol2all
      JWT_SECRET: ci_jwt_secret_key_minimum_32_chars!
      JWT_REFRESH_SECRET: ci_refresh_secret_key_minimum_32!!
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: test
      FRONTEND_URL: http://localhost:5173
      VITE_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # ── Backend ────────────────────────────────────────────────
      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Push schema & seed
        run: npx prisma db push --skip-generate && npx prisma db seed
        working-directory: backend

      - name: Start backend
        run: nohup npm run start:prod &
        working-directory: backend

      - name: Wait for backend
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000 > /dev/null 2>&1 && echo "Backend ready" && exit 0
            echo "Waiting ($i)..." && sleep 3
          done
          echo "Backend did not start in time" && exit 1

      # ── Frontend + Playwright ──────────────────────────────────
      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
