version: '3.9'

# Development compose — uses volume mounts for hot reload
# For production use: docker compose -f docker-compose.prod.yml up

services:
  db:
    image: postgres:16-alpine
    container_name: mol2all_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mol2all}
      POSTGRES_USER: ${POSTGRES_USER:-mol2all}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mol2all_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mol2all}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mol2all_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mol2all}:${POSTGRES_PASSWORD:-mol2all_secret}@db:5432/${POSTGRES_DB:-mol2all}
      JWT_SECRET: ${JWT_SECRET:-change_me_in_development}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_refresh_in_development}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mol2all_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000/api
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
