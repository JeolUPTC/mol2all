<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Molecule bonds -->
  <line x1="256" y1="160" x2="160" y2="296" stroke="#6366f1" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="160" x2="352" y2="296" stroke="#6366f1" stroke-width="16" stroke-linecap="round"/>
  <line x1="160" y1="296" x2="256" y2="360" stroke="#818cf8" stroke-width="16" stroke-linecap="round"/>
  <line x1="352" y1="296" x2="256" y2="360" stroke="#818cf8" stroke-width="16" stroke-linecap="round"/>

  <!-- Atom nodes -->
  <circle cx="256" cy="152" r="36" fill="#6366f1"/>
  <circle cx="160" cy="296" r="28" fill="#818cf8"/>
  <circle cx="352" cy="296" r="28" fill="#818cf8"/>
  <circle cx="256" cy="360" r="28" fill="#a5b4fc"/>

  <!-- Letter M centered in top atom -->
  <text x="256" y="162" text-anchor="middle" dominant-baseline="middle"
        font-family="sans-serif" font-weight="800" font-size="36" fill="white">M</text>

  <!-- Bottom label -->
  <text x="256" y="446" text-anchor="middle" dominant-baseline="middle"
        font-family="sans-serif" font-weight="700" font-size="44" fill="#e2e8f0"
        letter-spacing="4">MOL2ALL</text>
</svg>
